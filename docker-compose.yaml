services:

  db:
    image: postgres:16-alpine
    container_name: 2026_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=2026_db
    ports:
      - "5432:5432"
    volumes:
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  queue:
    image: redis:7-alpine
    container_name: 2026_queue
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  scheduler:
    container_name: 2026_scheduler
    build:
      context: ./services/scheduler
    command: python -m src.main
    environment:
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
    depends_on:
      - queue
    restart: always

  scraper:
    container_name: 2026_scraper
    build:
      context: ./services/scraper
    command: python -m src.main
    environment:
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
    volumes:
      - ./shared:/app/shared
    depends_on:
      - queue
      - db
    restart: always

  processor:
    container_name: 2026_processor
    build:
      context: ./services/processor
    command: python -m src.main
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    dns:
      - 8.8.8.8
    volumes:
      - ./shared:/app/shared
    depends_on:
      - queue
      - db
    restart: always

  aggregator:
    container_name: 2026_aggregator
    build:
      context: ./services/aggregator
    command: python -m src.main
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://admin:admin@db:5432/2026_db
      - AGGREGATOR_INTERVAL=600
    dns:
      - 8.8.8.8
    volumes:
      - ./shared:/app/shared
    depends_on:
      - db
      - sentiment_analyzer
    restart: always

  web_api:
    container_name: 2026_web_api
    build:
      context: ./services/web_api
    command: python -m src.main
    environment:
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
    volumes:
      - ./shared:/app/shared
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always

  jupyter_research:
    container_name: 2026_jupyter_research
    build:
      context: ./research
    ports:
      - "8888:8888"
    volumes:
      - ./research:/app
    environment:
      - JUPYTER_TOKEN=mentor2026

  metrics_updater:
    container_name: 2026_metrics_updater
    build:
      context: ./services/metrics_updater
    command: python -m src.main
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://admin:admin@db:5432/2026_db
      - SHAREDCOUNT_API_KEY=${SHAREDCOUNT_API_KEY}
      - METRICS_POLL_INTERVAL=30
    dns:
      - 8.8.8.8
    depends_on:
      - db
      - queue
    restart: always

  pgadmin:
    container_name: 2026_pgadmin
    image: dpage/pgadmin4
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@mentor.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db

  sentiment_analyzer:
    container_name: 2026_sentiment_analyzer
    build:
      context: ./services/sentiment_analyzer
    command: python -m src.main
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://admin:admin@db:5432/2026_db
      - SENTIMENT_POLL_INTERVAL=30
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - db
      - metrics_updater
    restart: always

  dashboard:
    container_name: 2026_dashboard
    build:
      context: ./services/dashboard
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://admin:admin@db:5432/2026_db
    ports:
      - "8501:8501"
    depends_on:
      - db
      - aggregator
    restart: always

volumes:
  pgdata:
  redisdata:
  huggingface_cache:
